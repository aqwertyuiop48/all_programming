name: Run All scripts

on:
  # push:
  #   branches: [ "main" ]
  # pull_request:
  #   branches: [ "main" ]
  workflow_dispatch:
    inputs:
      job_to_run:
        description: 'Select which job configuration to execute'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - vercel-docker
          - leetcode
          - upgrad
      reason:
        description: 'Reason for trigger'
        required: false

permissions:
  contents: read
  actions: write
  statuses: write

jobs:
  # --- FIRST SUB-JOB ---
  vercel-docker-job:
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.job_to_run == 'all' || github.event.inputs.job_to_run == 'vercel-docker' }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Trigger Vercel Docker Workflow
        env:
          GH_TOKEN: ${{ secrets.TRIGGER_PAT_AQWERTYUIOP48 }}
        run: |
          gh workflow run trigger-branches.yml --repo aqwertyuiop48/vercel_docker_programming --ref main


# --- SECOND SUB-JOB ---
  leetcode-job:
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.job_to_run == 'all' || github.event.inputs.job_to_run == 'leetcode' }}
    strategy:
      max-parallel: 1 # <-- Forces sequential execution, running one at a time
      matrix:
        workflow: [
          "bitbucket_sreebitbucket19.yml",
          "gitlab_sreegithub19.yml",
          "trigger_gitforcode_debug.yml",
          "vercel_repos.yml",
          "vercel_repos_1.yml",
          "vercel_repos_2.yml",
          "trigger_repos.yml",
          "trigger_repos1.yml",
          "render_.yml",
          "render_1.yml"
        ]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Trigger LeetCode Workflows Sequentially
        env:
          GH_TOKEN: ${{ secrets.TRIGGER_PAT_AQWERTYUIOP48 }}
        run: |
          gh workflow run "${{ matrix.workflow }}" --repo aqwertyuiop48/leetcode_programming --ref main


  # --- THIRD SUB-JOB ---
  upgrad-job:
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.job_to_run == 'all' || github.event.inputs.job_to_run == 'upgrad' }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Trigger First UpGrad Domino
        env:
          GH_TOKEN: ${{ secrets.TRIGGER_PAT_AQWERTYUIOP48 }}
        run: |
          # Only trigger the FIRST file. The cascade (workflow_run) will handle the rest.
          gh workflow run main.yml --repo aqwertyuiop48/upgrad_programming_1 --ref main1
